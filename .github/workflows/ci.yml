name: Banking App CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  # -------- Manual trigger with inputs --------------------------------------------------------------------------------------------------------------------------------------------------------------------
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        required: false
        default: false
        type: boolean
  # -------- Scheduled nightly build --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC daily

env:
  APP_NAME: banking-app
  PYTHON_VERSION: "3.11"

jobs:

  # -------- Job 1: Matrix Unit Tests ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('app/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          cd app
          python -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-flask

      - name: Run unit tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          API_KEY: banking-secret-key-2024
        run: |
          cd app
          . venv/bin/activate
          pytest test_app.py -v \
            --junitxml=test-results-${{ matrix.python-version }}.xml \
            --cov=app \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            app/test-results-${{ matrix.python-version }}.xml
            app/coverage-${{ matrix.python-version }}.xml

  # -------- Job 2: SonarQube Analysis ------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report (Python 3.11)
        uses: actions/download-artifact@v4
        with:
          name: test-results-3.11
          path: app/

      - name: Rename coverage file
        run: mv app/coverage-3.11.xml app/coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=banking-app
            -Dsonar.projectName="Banking App"
            -Dsonar.sources=app
            -Dsonar.exclusions=**/venv/**,**/__pycache__/**,**/test_*.py
            -Dsonar.python.coverage.reportPaths=app/coverage.xml

  # -------- Job 3: Docker Build & Push to JFrog ----------------------------------------------------------------------------------------------------------------------------
  build:
    name: Docker Build & Push to JFrog
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          TAG="${{ github.run_number }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Build Docker image
        run: |
          cd app
          docker build \
            -t ${{ env.APP_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.APP_NAME }}:latest \
            .
          docker images | grep ${{ env.APP_NAME }}

      - name: Save & Push to JFrog via curl
        run: |
          echo "Saving image as tar..."
          docker save ${{ env.APP_NAME }}:latest \
            -o /tmp/${{ env.APP_NAME }}-${{ steps.meta.outputs.tag }}.tar

          echo "Uploading to JFrog Artifactory..."
          curl -u admin:password \
            -X PUT \
            "http://${{ secrets.SONAR_HOST_URL_PRIVATE }}:8081/artifactory/banking-docker/${{ env.APP_NAME }}-${{ steps.meta.outputs.tag }}.tar" \
            -T /tmp/${{ env.APP_NAME }}-${{ steps.meta.outputs.tag }}.tar \
            --progress-bar || echo "JFrog upload skipped (VPC only accessible from AWS)"

          echo " Build complete: ${{ env.APP_NAME }}:${{ steps.meta.outputs.tag }}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.meta.outputs.tag }}
          path: /tmp/${{ env.APP_NAME }}-${{ steps.meta.outputs.tag }}.tar
          retention-days: 1

  # -------- Job 4: Deploy to Staging ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    environment:
      name: staging
      url: http://3.104.203.56:8090

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build.outputs.image-tag }}
          path: /tmp/

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying banking-app to staging..."
            sudo docker stop banking-app 2>/dev/null || true
            sudo docker rm banking-app 2>/dev/null || true
            sudo docker run -d \
              --name banking-app \
              --restart unless-stopped \
              -p 8090:8090 \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=5432 \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e API_KEY=${{ secrets.API_KEY }} \
              banking-app:latest
            sudo docker ps | grep banking-app
            echo "Staging deployment complete!"

      - name: Health Check - Staging
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.DEPLOY_HOST }}:8090/health || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo " Staging is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo " Staging health check failed"
          exit 1

  # -------- Job 5: Deploy to Production (with approval) ------------------------------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/master'
    environment:
      name: production
      url: http://banking-alb-1942364575.ap-southeast-2.elb.amazonaws.com

    steps:
      - name: Production Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Production deployment approved and executing..."
            sudo docker ps | grep banking-app
            echo " Production deployment complete!"

      - name: Verify via ALB
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://banking-alb-1942364575.ap-southeast-2.elb.amazonaws.com/health)
          echo "ALB Health Check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo " Production verified via ALB!"
          else
            echo " ALB check returned $HTTP_CODE"
          fi


# Job 6: Notify
  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, sonarqube, build, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Pipeline Summary
        run: |
          echo "Banking App Pipeline Summary"
          echo "------------------------------------"
          echo "Workflow : ${{ github.workflow }}"
          echo "Trigger  : ${{ github.event_name }}"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Run No   : ${{ github.run_number }}"
          echo "------------------------------------"
          echo "Tests    : ${{ needs.test.result }}"
          echo "Sonar    : ${{ needs.sonarqube.result }}"
          echo "Build    : ${{ needs.build.result }}"
          echo "Staging  : ${{ needs.deploy-staging.result }}"
          echo "Prod     : ${{ needs.deploy-production.result }}"
          echo "------------------------------------"

