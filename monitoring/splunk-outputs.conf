# ══════════════════════════════════════════════════════════════════════════════
# Splunk Universal Forwarder - outputs.conf
# Forwards logs to Splunk indexer on monitoring server
# ══════════════════════════════════════════════════════════════════════════════

[tcpout]
defaultGroup = splunk_indexer

[tcpout:splunk_indexer]
server            = 52.64.128.1:9997
useSSL            = false
sslVerifyServerCert = false
