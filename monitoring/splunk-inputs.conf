# ══════════════════════════════════════════════════════════════════════════════
# Splunk Universal Forwarder - inputs.conf
# Deploy to: /opt/splunkforwarder/etc/system/local/inputs.conf
# On: Deploy Target (3.25.111.45)
# ══════════════════════════════════════════════════════════════════════════════

# ── Docker container logs (banking app) ───────────────────────────────────────
[monitor:///var/lib/docker/containers/*/*-json.log]
disabled   = false
index      = banking_app
sourcetype = docker_logs
_meta      = app::banking-app env::production

# ── Application access logs ────────────────────────────────────────────────────
[monitor:///opt/banking-app/logs/access.log]
disabled   = false
index      = banking_app
sourcetype = banking_access
_meta      = app::banking-app

# ── Application error logs ─────────────────────────────────────────────────────
[monitor:///opt/banking-app/logs/error.log]
disabled   = false
index      = banking_app
sourcetype = banking_error
_meta      = app::banking-app

# ── System auth logs (security monitoring) ────────────────────────────────────
[monitor:///var/log/auth.log]
disabled   = false
index      = os_security
sourcetype = linux_secure

# ── UFW Firewall logs ──────────────────────────────────────────────────────────
[monitor:///var/log/ufw.log]
disabled   = false
index      = os_security
sourcetype = ufw

# ── Syslog ────────────────────────────────────────────────────────────────────
[monitor:///var/log/syslog]
disabled   = false
index      = os_logs
sourcetype = syslog
