version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: banking-db
    environment:
      POSTGRES_USER:     bankuser
      POSTGRES_PASSWORD: bankpassword
      POSTGRES_DB:       bankdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: banking-app
    environment:
      DB_USER:     bankuser
      DB_PASSWORD: bankpassword
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     bankdb
      API_KEY:     changeme-secret-key
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
